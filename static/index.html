<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP & Clock Monitor</title>
    <!-- Clarity Design System CDN -->
    <link rel="stylesheet" href="https://unpkg.com/@cds/core@6.9.2/global.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/@cds/core@6.9.2/styles/theme.dark.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/@clr/ui@17.0.0/clr-ui.min.css" />
    <!-- Clarity City Font -->
    <link rel="stylesheet" href="https://unpkg.com/@cds/city@1.1.0/css/bundles/default.min.css" />
    <style>
        html, body {
            height: 100%;
        }
        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            min-width: 360px;
        }
        .ip-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
        }
        .clock-display {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.05em;
            font-family: var(--cds-global-typography-font-family, 'Clarity City'), monospace;
        }
        .container-badge {
            position: fixed;
            top: 1rem;
            right: 1rem;
        }
        .container-badge .arrow {
            animation: blink 1s step-start infinite;
        }
        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body cds-theme="light" cds-text="body">
    <!-- Container ID Badge -->
    <div class="container-badge">
        <span class="label label-info">
            <span class="arrow">&gt;</span> <span id="container-id"></span>
        </span>
    </div>

    <!-- Main Content -->
    <div class="main-container">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title" cds-text="section">IP & Clock Monitor</h3>
            </div>
            <div class="card-block">
                <!-- IP Section -->
                <div class="card-text">
                    <div class="ip-row">
                        <span cds-text="secondary">Server IP</span>
                        <span cds-text="body medium" id="server-ip">Loading...</span>
                    </div>
                    <div class="ip-row">
                        <span cds-text="secondary">Client IP</span>
                        <span cds-text="body medium" id="client-ip">Loading...</span>
                    </div>
                </div>
            </div>
            <div class="card-divider"></div>
            <div class="card-block">
                <!-- Clock Section -->
                <div class="card-text" style="text-align: center;">
                    <div class="clock-display" cds-text="display" id="clock">00:00:00</div>
                    <p cds-text="caption" id="date"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchIPs() {
            try {
                const response = await fetch('/api/ip');
                const data = await response.json();
                document.getElementById('server-ip').textContent = data.serverIP;
                document.getElementById('client-ip').textContent = data.clientIP;
            } catch (error) {
                document.getElementById('server-ip').textContent = 'Error';
                document.getElementById('client-ip').textContent = 'Error';
                console.error('Failed to fetch IPs:', error);
            }
        }

        function updateClock() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('en-US', options);
            const tzStr = now.toLocaleTimeString('en-US', { timeZoneName: 'short' }).split(' ').pop();
            document.getElementById('date').textContent = `${dateStr} (${tzStr})`;
        }

        async function fetchConfig() {
            try {
                const response = await fetch('/api/config');
                const data = await response.json();
                document.getElementById('container-id').textContent = data.containerID;
            } catch (error) {
                console.error('Failed to fetch config:', error);
            }
        }

        fetchIPs();
        fetchConfig();
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
